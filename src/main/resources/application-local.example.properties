spring.datasource.url=jdbc:mysql://localhost:3306/football_v2?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_LOCAL_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

jwt.secret=CHANGE_THIS_TO_A_RANDOM_SECRET_AT_LEAST_32_BYTES_LONG
jwt.access-token-expiration=3600000
