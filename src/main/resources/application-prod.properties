spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 1차 시험 운영에서는 스키마를 자동 갱신합니다. 운영 안정화 후 Flyway + validate로 전환합니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=10000

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:604800000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

logging.level.root=info
logging.level.org.hibernate.SQL=info
logging.level.org.hibernate.orm.jdbc.bind=off

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.h2.console.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.forward-headers-strategy=framework
spring.jackson.time-zone=Asia/Seoul
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
